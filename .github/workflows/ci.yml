name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore OfficeAutomation.sln

      - name: Build
        run: dotnet build OfficeAutomation.sln --no-restore -c Release

      - name: Test
        run: dotnet test OfficeAutomation.Tests/OfficeAutomation.Tests.csproj --no-build -c Release
